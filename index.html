<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluenPay - Creator Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --text: #1e293b;
            --text-light: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* ----- AUTH ----- */
        #auth-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; }
        .auth-card { background: var(--card); border-radius: 32px; padding: 48px; width: 100%; max-width: 480px; border: 2px solid var(--border); text-align: center; }

        /* ----- TOUR GUIDE (ONBOARDING) ----- */
        #tour-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 5000; display: none; }
        .tour-step { background: var(--card); border-radius: 20px; padding: 24px; width: 300px; position: absolute; border: 2px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tour-button { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.8rem; background: var(--primary); color: white; margin-top: 12px; }

        /* ----- MODAL SYSTEM ----- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: var(--card); border-radius: 24px; padding: 32px; width: 100%; max-width: 400px; text-align: center; border: 2px solid var(--border); }

        /* ----- TOASTS ----- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 4000; }
        .toast { background: var(--dark); color: white; padding: 12px 24px; border-radius: 12px; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 12px; animation: slideInRight 0.4s forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* ----- APP ----- */
        #app-wrapper { display: none; width: 100%; height: 100%; }
        .sidebar { width: 280px; background: var(--card); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 20px 28px; position: fixed; height: 100vh; z-index: 999; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; margin-left: 280px; padding-top: 80px; }

        .nav-link { display: flex; align-items: center; gap: 14px; padding: 14px 16px; color: var(--text-light); border-radius: 16px; cursor: pointer; font-weight: 600; text-decoration: none; border: 2px solid transparent; transition: 0.3s; margin-bottom: 4px; }
        .nav-link.active { background: var(--primary); color: white; }

        .card { background: var(--card); border-radius: 24px; padding: 28px; border: 2px solid var(--border); margin-bottom: 24px; }
        .btn { padding: 14px 28px; border-radius: 16px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; text-align: center; }
        .btn-primary { background: var(--gradient-1); color: white; }
        .loader { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Validation Colors */
        .invalid-input { border-color: var(--danger) !important; background: #fff1f2 !important; }
    </style>
</head>
<body>

    <!-- ----- ONBOARDING OVERLAY ----- -->
    <div id="tour-overlay"></div>

    <!-- ----- NOTIFICATIONS ----- -->
    <div id="toast-container"></div>

    <!-- ----- MODALS ----- -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- ----- LOGIN ----- -->
    <div id="auth-container">
        <div class="auth-card">
            <div style="font-size: 2.5rem; font-weight: 800; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px;"><i class="fa-solid fa-bolt"></i> FluenPay</div>
            <h2 style="margin-bottom: 32px;">Start Your Creator Journey</h2>
            <div style="text-align:left; margin-bottom:20px;">
                <label>Name</label>
                <input type="text" id="user-name-input" placeholder="Ahmed" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--border); margin-top:8px;">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleAuth()">Enter Creator Hub</button>
        </div>
    </div>

    <!-- ----- APP ----- -->
    <div id="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div style="font-size: 1.8rem; font-weight:800; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom: 40px;"><i class="fa-solid fa-bolt"></i> FluenPay</div>
            <nav id="tour-step-1">
                <div class="nav-link active" onclick="showPage('dashboard', this)"><i class="fa-solid fa-house"></i> Dashboard</div>
                <div class="nav-link" id="tour-step-2" onclick="showPage('receipts', this)"><i class="fa-solid fa-camera"></i> Snap Receipt</div>
                <div class="nav-link" id="tour-step-3" onclick="showPage('wallet', this)"><i class="fa-solid fa-coins"></i> Wallet</div>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
                <h1 id="page-title" style="font-size: 2rem;">Dashboard</h1>
                <div id="user-welcome" style="font-weight: 800; opacity: 0.8;">Salim Ahmed</div>
            </header>

            <section id="dashboard" class="page-section active">
                <div class="card" style="background:var(--gradient-1); color:white;">
                    <h2>Status: Rising Star 🌟</h2>
                    <p style="opacity:0.9;">Secure SAR 500 more to unlock Verified status.</p>
                </div>
                <div class="card">
                    <h3>Your Niche</h3>
                    <div style="display:flex; gap:10px; margin-top:12px;">
                        <span class="btn btn-primary" style="padding:10px 20px;">Fashion</span>
                        <span class="btn" style="padding:10px 20px; background:var(--bg);">Tech</span>
                    </div>
                </div>
            </section>

            <section id="receipts" class="page-section">
                <div class="card">
                    <h3>Snap & Earn 📸</h3>
                    <div style="margin-top:20px;">
                        <div style="margin-bottom:15px;">
                            <label style="font-weight:700;">Post Link (IG/TikTok)</label>
                            <input type="text" id="post-url" placeholder="https://instagram.com/p/..." onblur="validateURL(this)" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--border); margin-top:8px;">
                        </div>
                        <button class="btn btn-primary" onclick="submitReceipt()">Secure My 10%</button>
                    </div>
                </div>
            </section>

            <section id="wallet" class="page-section">
                <div class="card">
                    <h2 style="font-size: 2.5rem; margin-bottom:20px;">SAR 2,500.00</h2>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <button class="btn" style="background:var(--bg); border: 2px solid var(--border);" onclick="payoutFlow()">Bank Payout</button>
                        <button class="btn" id="tour-step-4" style="background:var(--bg); border: 2px solid var(--border);" onclick="payoutFlow()">ATM Code</button>
                    </div>
                    <div style="margin-top:24px;">
                        <label style="font-weight:700;">Your IBAN (For Payouts)</label>
                        <input type="text" id="iban-input" placeholder="SA..." onblur="validateIBAN(this)" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--border); margin-top:8px;">
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- DATA PERSISTENCE ---
        let userData = JSON.parse(localStorage.getItem('fluenpay_user')) || { name: 'Creator', seenTour: false };

        function handleAuth() {
            const name = document.getElementById('user-name-input').value || 'Ahmed';
            userData.name = name;
            localStorage.setItem('fluenpay_user', JSON.stringify(userData));
            
            document.getElementById('auth-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'flex';
                document.getElementById('user-welcome').innerText = `Hello, ${userData.name}!`;
                if (!userData.seenTour) startTour();
            }, 500);
        }

        // --- TOUR GUIDE ---
        let currentTourStep = 0;
        const steps = [
            { id: 'tour-step-1', text: "Welcome! This is your navigation hub. Move between home and work here." },
            { id: 'tour-step-2', text: "This is the most important part! Upload your receipts here to get paid." },
            { id: 'tour-step-3', text: "Keep an eye on 'The Bag'. This is where your money stacks up." },
            { id: 'tour-step-4', text: "Ready for cash? Generate instant codes to withdraw from any ATM!" }
        ];

        function startTour() {
            document.getElementById('tour-overlay').style.display = 'block';
            nextTourStep();
        }

        function nextTourStep() {
            if (currentTourStep >= steps.length) {
                document.getElementById('tour-overlay').style.display = 'none';
                userData.seenTour = true;
                localStorage.setItem('fluenpay_user', JSON.stringify(userData));
                showToast('Onboarding Complete! Time to earn. 💸');
                return;
            }

            const step = steps[currentTourStep];
            const el = document.getElementById(step.id);
            const rect = el.getBoundingClientRect();

            document.getElementById('tour-overlay').innerHTML = `
                <div class="tour-step" style="top: ${rect.bottom + 15}px; left: ${rect.left}px;">
                    <p style="font-weight:600;">Step ${currentTourStep + 1} of 4</p>
                    <p style="margin-top:8px; color:var(--text-light);">${step.text}</p>
                    <button class="tour-button" onclick="nextTourStep()">Next Step &rarr;</button>
                </div>
            `;
            currentTourStep++;
        }

        // --- VALIDATION ---
        function validateURL(el) {
            const val = el.value.toLowerCase();
            if (val && !val.includes('instagram.com') && !val.includes('tiktok.com')) {
                el.classList.add('invalid-input');
                showToast('⚠️ Must be an Instagram or TikTok link!');
            } else {
                el.classList.remove('invalid-input');
            }
        }

        function validateIBAN(el) {
            const val = el.value.toUpperCase();
            if (val && (!val.startsWith('SA') || val.length !== 24)) {
                el.classList.add('invalid-input');
                showToast('⚠️ Invalid IBAN. Must start with SA and be 24 digits.');
            } else {
                el.classList.remove('invalid-input');
                userData.iban = val;
                localStorage.setItem('fluenpay_user', JSON.stringify(userData));
            }
        }

        // --- UTILS ---
        function showPage(pageId, el) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i class="fa-solid fa-bell"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function payoutFlow() {
            showToast('Processing Payout Strategy...');
        }

        function submitReceipt() {
            showToast('Receipt Submitted! Verification in progress.');
        }

        window.onload = () => {
             const saved = localStorage.getItem('fluenpay_user');
             if (saved) {
                const data = JSON.parse(saved);
                if (data.name !== 'Creator') {
                    // Pre-fill login
                    document.getElementById('user-name-input').value = data.name;
                }
             }
        };
    </script>
</body>
</html>
